# echoes_hub/docker-compose.yml
version: '3.8'

services:
  # ==================== БАЗА ДАННЫХ ====================
  db:
    image: postgres:15-alpine
    container_name: echoes_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - echoes_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: echoes_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_/data
    ports:
      - "6379:6379"
    networks:
      - echoes_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== RABBITMQ ====================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: echoes_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - echoes_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== DJANGO (Основной сайт) ====================
  django:
    build:
      context: ./backend_django
      dockerfile: Dockerfile
    container_name: echoes_django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend_django:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DJANGO_DEBUG}
      - ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - echoes_network

  # ==================== FASTAPI (Игровой сервис) ====================
  game:
    build:
      context: ./backend_game
      dockerfile: Dockerfile
    container_name: echoes_game
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./backend_game:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - OLLAMA_HOST=${OLLAMA_HOST}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - echoes_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ==================== CELERY WORKER (Общий для обоих сервисов) ====================
  worker:
    build:
      context: ./backend_game
      dockerfile: Dockerfile
    container_name: echoes_worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend_game:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - echoes_network

  # ==================== CELERY BEAT (Планировщик) ====================
  beat:
    build:
      context: ./backend_game
      dockerfile: Dockerfile
    container_name: echoes_beat
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./backend_game:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - echoes_network

  # ==================== NGINX (Reverse Proxy) ====================
  nginx:
    image: nginx:alpine
    container_name: echoes_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend_django/echoes_hub/static:/var/www/static:ro
      - ./backend_django/echoes_hub/media:/var/www/media:ro
    depends_on:
      - django
      - game
    networks:
      - echoes_network

# ==================== ТОМА ====================
volumes:
  pg_data:
  redis_data:
  rabbitmq_data:

# ==================== СЕТИ ====================
networks:
  echoes_network:
    driver: bridge
# echoes_hub/docker-compose.yml
version: '3.8'

services:
  # 🔹 PostgreSQL - База данных
  db:
    image: postgres:15-alpine
    container_name: echoes_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - echoes_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🔴 Redis - Кэш и хранение состояний
  redis:
    image: redis:7-alpine
    container_name: echoes_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - echoes_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🐰 RabbitMQ - Брокер очередей для Celery
  rabbitmq:
    image: rabbitmq:3-management
    container_name: echoes_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # Порт для соединений
      - "15672:15672" # Веб-интерфейс управления
    networks:
      - echoes_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 🐍 Backend - FastAPI приложение
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echoes_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - echoes_network
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Доступ к Ollama на хосте

  # 👷 Celery Worker - Фоновые задачи
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echoes_worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - echoes_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 🕐 Celery Beat - Планировщик задач
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echoes_beat
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - echoes_network

# 📦 Тома для постоянного хранения данных
volumes:
  pg_data:
  redis_data:
  rabbitmq_data:

# 🌐 Сеть для связи сервисов
networks:
  echoes_network:
    driver: bridge